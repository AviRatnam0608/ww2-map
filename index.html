<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WW2 Interactive Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ═══════════════════════════════════════
   styles/base.css - Reset & Variables
   ═══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0c10;
  --bg-panel: #0d0f14;
  --bg-panel-end: #111520;
  --gold: #c0a030;
  --gold-bright: #e0c060;
  --gold-dim: rgba(180, 160, 120, 0.5);
  --gold-faint: rgba(180, 160, 120, 0.15);
  --gold-ghost: rgba(180, 160, 120, 0.08);
  --text-primary: #e8e0d0;
  --text-secondary: rgba(200, 190, 170, 0.7);
  --text-dim: rgba(180, 170, 150, 0.6);
  --text-ghost: rgba(180, 160, 120, 0.4);
  --axis-color: #b42828;
  --axis-peak: #d43030;
  --turning-color: #c4a020;
  --allied-color: #2860a0;
  --victory-color: #2a7030;
  --soviet-color: rgba(140, 30, 30, 0.8);
  --font-serif: 'EB Garamond', 'Garamond', 'Georgia', serif;
  --font-mono: 'Courier New', monospace;
  --panel-width: 320px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg-primary); }

body {
  font-family: var(--font-serif);
  color: var(--text-primary);
  display: flex;
}

/* ═══════════════════════════════════════
   styles/timeline.css - Left Panel
   ═══════════════════════════════════════ */
#timeline-panel {
  width: var(--panel-width);
  min-width: var(--panel-width);
  height: 100vh;
  background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-end) 100%);
  border-right: 1px solid var(--gold-faint);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  position: relative;
}

.panel-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid rgba(180, 160, 120, 0.1);
}

.panel-header .subtitle {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.panel-header h1 {
  font-size: 28px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.1;
}

.panel-header .tagline {
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 4px;
  font-style: italic;
}

/* Year selector */
.year-selector {
  padding: 10px 24px;
  border-bottom: 1px solid var(--gold-ghost);
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.year-btn {
  flex: 1;
  min-width: 44px;
  padding: 7px 4px;
  background: transparent;
  border: 1px solid var(--gold-ghost);
  border-radius: 3px;
  color: var(--text-ghost);
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  transition: all 0.25s ease;
  text-align: center;
}

.year-btn:hover { background: var(--gold-ghost); color: var(--text-secondary); }
.year-btn.active {
  background: var(--gold-ghost);
  border-color: var(--gold-dim);
  color: var(--gold-bright);
  font-weight: bold;
}
.year-btn.all-btn { letter-spacing: 1.5px; font-size: 10px; text-transform: uppercase; }

/* Play button */
.play-section {
  padding: 12px 24px;
  border-bottom: 1px solid var(--gold-ghost);
}

#play-btn {
  width: 100%;
  padding: 10px 16px;
  background: var(--gold-ghost);
  border: 1px solid var(--gold-faint);
  border-radius: 4px;
  color: var(--gold);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-serif);
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

#play-btn:hover { background: rgba(180, 160, 120, 0.12); }
#play-btn.playing {
  background: rgba(180, 40, 40, 0.2);
  border-color: rgba(180, 40, 40, 0.4);
  color: #d08080;
}

/* Timeline list */
#timeline-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.timeline-event {
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 24px;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  cursor: pointer;
  text-align: left;
  font-family: var(--font-serif);
  transition: all 0.3s ease;
  opacity: 0.65;
}

.timeline-event:hover { background: rgba(180, 160, 120, 0.04); opacity: 0.85; }

.timeline-event.active {
  background: var(--gold-ghost);
  opacity: 1;
}

.timeline-event.past { opacity: 0.4; }

.event-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 20px;
  padding-top: 3px;
}

.event-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold-faint);
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.timeline-event.active .event-dot {
  width: 12px;
  height: 12px;
}

.event-line {
  width: 1px;
  flex: 1;
  min-height: 20px;
  background: var(--gold-ghost);
}

.timeline-event.past .event-line { background: rgba(180, 160, 120, 0.15); }

.event-content { flex: 1; padding-bottom: 8px; }

.event-date {
  font-size: 11px;
  color: var(--text-ghost);
  letter-spacing: 1px;
  margin-bottom: 2px;
  font-family: var(--font-mono);
}

.timeline-event.active .event-date { letter-spacing: 1.5px; }

.event-title {
  font-size: 15px;
  color: var(--text-secondary);
  font-weight: 400;
  line-height: 1.3;
  transition: color 0.3s ease;
}

.timeline-event.active .event-title {
  color: var(--text-primary);
  font-weight: 600;
}

.event-description {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-top: 6px;
  display: none;
  animation: fadeIn 0.4s ease;
}

.timeline-event.active .event-description { display: block; }

/* Legend */
#legend {
  padding: 16px 24px;
  border-top: 1px solid rgba(180, 160, 120, 0.1);
}

#legend .legend-title {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-ghost);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
}

.legend-swatch.circle { border-radius: 50%; }

.legend-label {
  font-size: 12px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════
   styles/map.css - Map Area
   ═══════════════════════════════════════ */
#map-container {
  flex: 1;
  height: 100vh;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
  background: var(--bg-primary);
}

/* Override Leaflet styles for dark theme */
.leaflet-container { background: #0a0c10 !important; }
.leaflet-control-zoom a {
  background: rgba(13, 15, 20, 0.9) !important;
  color: var(--gold) !important;
  border-color: var(--gold-faint) !important;
  font-size: 16px !important;
}
.leaflet-control-zoom a:hover {
  background: rgba(30, 35, 45, 0.95) !important;
}
.leaflet-control-attribution {
  background: rgba(10, 12, 16, 0.7) !important;
  color: rgba(180, 160, 120, 0.3) !important;
  font-size: 9px !important;
}
.leaflet-control-attribution a { color: rgba(180, 160, 120, 0.4) !important; }

/* Phase indicator overlay */
#phase-indicator {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: rgba(10, 12, 16, 0.88);
  border: 1px solid rgba(180, 160, 120, 0.15);
  border-radius: 4px;
  backdrop-filter: blur(12px);
  pointer-events: none;
}

#phase-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

#phase-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

#phase-date {
  font-size: 14px;
  color: var(--gold);
  margin-left: 8px;
}

/* Progress bar */
#progress-bar-bg {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: rgba(180, 160, 120, 0.08);
  z-index: 1000;
}

#progress-bar-fill {
  height: 100%;
  width: 0%;
  transition: width 0.6s ease, background 0.6s ease;
}

/* ═══════════════════════════════════════
   styles/cityPanel.css - Info Panel
   ═══════════════════════════════════════ */
#city-panel {
  position: absolute;
  top: 60px;
  right: 16px;
  width: 350px;
  max-height: calc(100vh - 100px);
  background: rgba(13, 15, 20, 0.96);
  border: 1px solid rgba(180, 160, 120, 0.2);
  border-radius: 6px;
  overflow: hidden;
  z-index: 1001;
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  display: none;
  animation: slideIn 0.3s ease;
}

#city-panel.open { display: block; }

.city-panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(180, 160, 120, 0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.city-panel-header .label {
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(192, 160, 48, 0.6);
  text-transform: uppercase;
}

.city-panel-header .city-name {
  font-size: 20px;
  color: var(--text-primary);
  margin-top: 2px;
}

#close-city-btn {
  width: 28px;
  height: 28px;
  background: rgba(180, 160, 120, 0.1);
  border: 1px solid var(--gold-faint);
  border-radius: 50%;
  color: var(--gold);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  transition: background 0.2s;
}

#close-city-btn:hover { background: rgba(180, 160, 120, 0.2); }

#city-event-tabs {
  display: none;
  border-bottom: 1px solid var(--gold-ghost);
}

#city-event-tabs.visible { display: flex; }

.city-tab {
  flex: 1;
  padding: 10px 12px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-ghost);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-serif);
  text-align: center;
  transition: all 0.2s ease;
}

.city-tab.active {
  background: var(--gold-ghost);
  border-bottom-color: var(--gold);
  color: var(--gold-bright);
}

#city-event-content {
  padding: 20px;
  overflow-y: auto;
  max-height: 380px;
}

.event-image-container {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, rgba(30, 35, 45, 1), rgba(20, 25, 35, 1));
  border-radius: 4px;
  margin-bottom: 16px;
  border: 1px solid var(--gold-ghost);
  position: relative;
  overflow: hidden;
}

.event-image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.event-image-container img.loaded { opacity: 1; }

.event-image-container .img-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease;
}

.event-image-container .img-placeholder.hidden { opacity: 0; }

.event-image-container .img-placeholder .icon { font-size: 24px; opacity: 0.3; }
.event-image-container .img-placeholder .img-label {
  font-size: 9px;
  color: rgba(180, 160, 120, 0.3);
  letter-spacing: 1px;
  margin-top: 4px;
}

.event-image-container .img-placeholder .loading-spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--gold-ghost);
  border-top-color: var(--gold-dim);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Notable people section */
.notable-people {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--gold-ghost);
}

.notable-people h4 {
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 8px;
  font-weight: 400;
}

.person-tag {
  display: inline-block;
  padding: 3px 10px;
  margin: 2px 4px 2px 0;
  background: var(--gold-ghost);
  border: 1px solid var(--gold-ghost);
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* Casualties / stats */
.event-stats {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.stat-item {
  padding: 6px 10px;
  background: rgba(180, 160, 120, 0.04);
  border: 1px solid var(--gold-ghost);
  border-radius: 3px;
  font-size: 11px;
  color: var(--text-dim);
}

.stat-item .stat-value {
  color: var(--text-primary);
  font-weight: 600;
  font-size: 13px;
  display: block;
  margin-bottom: 1px;
}

#city-event-title {
  font-size: 18px;
  font-weight: 400;
  color: var(--text-primary);
  margin-bottom: 4px;
}

#city-event-date {
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: 1px;
  font-family: var(--font-mono);
}

#city-event-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.event-source {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--gold-ghost);
  font-size: 10px;
  color: rgba(180, 160, 120, 0.3);
}

/* Hint text */
#map-hint {
  position: absolute;
  bottom: 14px;
  right: 16px;
  font-size: 11px;
  color: rgba(180, 160, 120, 0.2);
  z-index: 1000;
  pointer-events: none;
}

/* ═══════════════════════════════════════
   styles/animations.css
   ═══════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(180, 160, 120, 0.15); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(180, 160, 120, 0.25); }

/* Custom Leaflet marker */
.city-marker-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}

.city-marker-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(192, 160, 48, 0.7);
  border: 2px solid rgba(192, 160, 48, 0.4);
  box-shadow: 0 0 8px rgba(192, 160, 48, 0.3);
  transition: all 0.3s ease;
}

.city-marker-dot.active {
  width: 14px;
  height: 14px;
  background: #c0a030;
  border-color: #e0c060;
  box-shadow: 0 0 16px rgba(192, 160, 48, 0.5);
}

/* City label tooltip */
.city-label {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  color: rgba(200, 190, 170, 0.6) !important;
  font-family: 'EB Garamond', Georgia, serif !important;
  font-size: 11px !important;
  font-style: italic;
  white-space: nowrap;
  padding: 0 !important;
}

.city-label::before { display: none !important; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     components/TimelinePanel
     ═══════════════════════════════════════ -->
<div id="timeline-panel">
  <div class="panel-header">
    <div class="subtitle">Interactive Atlas</div>
    <h1>World War II</h1>
    <div class="tagline">The Shifting Borders of Europe, 1939&ndash;1945</div>
  </div>

  <div class="year-selector" id="year-selector">
    <button class="year-btn all-btn active" data-year="all">All</button>
    <button class="year-btn" data-year="1939">1939</button>
    <button class="year-btn" data-year="1940">1940</button>
    <button class="year-btn" data-year="1941">1941</button>
    <button class="year-btn" data-year="1942">1942</button>
    <button class="year-btn" data-year="1943">1943</button>
    <button class="year-btn" data-year="1944">1944</button>
    <button class="year-btn" data-year="1945">1945</button>
  </div>

  <div class="play-section">
    <button id="play-btn">&#9654; Play Through War</button>
  </div>

  <div id="timeline-list"></div>

  <div id="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: rgba(180, 40, 40, 0.6)"></div>
      <div class="legend-label">Axis Powers</div>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: rgba(40, 80, 160, 0.5)"></div>
      <div class="legend-label">Western Allies</div>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: rgba(140, 30, 30, 0.5)"></div>
      <div class="legend-label">Soviet Union</div>
    </div>
    <div class="legend-item">
      <div class="legend-swatch circle" style="background: #c0a030; border: 2px solid #c0a030;"></div>
      <div class="legend-label">Battle / Event Marker</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     components/MapView
     ═══════════════════════════════════════ -->
<div id="map-container">
  <div id="phase-indicator">
    <div id="phase-dot"></div>
    <span id="phase-label"></span>
    <span id="phase-date"></span>
  </div>

  <div id="map"></div>

  <div id="progress-bar-bg">
    <div id="progress-bar-fill"></div>
  </div>

  <!-- ═══════════════════════════════════════
       components/CityInfoPanel
       ═══════════════════════════════════════ -->
  <div id="city-panel">
    <div class="city-panel-header">
      <div>
        <div class="label">Historical Events</div>
        <div class="city-name" id="city-panel-name"></div>
      </div>
      <button id="close-city-btn">&#10005;</button>
    </div>
    <div id="city-event-tabs"></div>
    <div id="city-event-content">
      <div class="event-image-container" id="city-image-container">
        <img id="city-event-img" alt="" />
        <div class="img-placeholder" id="city-img-placeholder">
          <div class="loading-spinner" id="city-img-spinner" style="display:none"></div>
          <div class="icon" id="city-img-icon">&#127963;&#65039;</div>
          <div class="img-label">HISTORICAL PHOTOGRAPH</div>
        </div>
      </div>
      <h3 id="city-event-title"></h3>
      <div id="city-event-date"></div>
      <p id="city-event-text"></p>
      <div class="event-stats" id="city-event-stats"></div>
      <div class="notable-people" id="city-notable-people" style="display:none">
        <h4>Notable Figures</h4>
        <div id="notable-people-list"></div>
      </div>
      <div class="event-source" id="city-event-source"></div>
    </div>
  </div>

  <div id="map-hint">Scroll to zoom &middot; Drag to pan &middot; Click markers to explore</div>
</div>

<!-- ═══════════════════════════════════════
     INLINE DATA MODULES
     (In Cursor, these would be separate imports)
     ═══════════════════════════════════════ -->
<script>
// ─── data/events.js ────────────────────────
const WW2_EVENTS = [
  // ── 1939 ──
  { id: "invasion_poland", year: 1939, date: "Sep 1, 1939", title: "Invasion of Poland", description: "Germany invades Poland with 1.5 million troops in a devastating Blitzkrieg. The Luftwaffe destroys the Polish Air Force on the ground. Britain and France declare war on September 3.", phase: "invasion_poland", wikiArticle: "Invasion_of_Poland" },
  { id: "battle_westerplatte", year: 1939, date: "Sep 1\u20137, 1939", title: "Battle of Westerplatte", description: "A small Polish garrison of 182 soldiers holds out for seven days against overwhelming German naval and ground forces at Gda\u0144sk, becoming a symbol of Polish resistance.", phase: "invasion_poland", wikiArticle: "Battle_of_Westerplatte" },
  { id: "battle_atlantic_begins", year: 1939, date: "Sep 3, 1939", title: "Battle of the Atlantic Begins", description: "The longest continuous military campaign of the war begins as German U-boats target Allied merchant shipping. Over 3,500 Allied vessels will be sunk by war\u2019s end.", phase: "invasion_poland", wikiArticle: "Battle_of_the_Atlantic" },
  { id: "soviet_invasion_poland", year: 1939, date: "Sep 17, 1939", title: "Soviet Invasion of Poland", description: "The Soviet Union invades eastern Poland per the Molotov\u2013Ribbentrop Pact\u2019s secret protocol. Poland is partitioned between Germany and the USSR.", phase: "invasion_poland", wikiArticle: "Soviet_invasion_of_Poland" },

      { id: "italy_1945", label: "Italy", color: "rgba(40,80,160,0.22)", borderColor: "rgba(40,80,160,0.4)",

<!-- ═══════════════════════════════════════
     App Logic (components/App.js equivalent)
     ═══════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  // ─── State ─────────────────────────
  let selectedEventIndex = 0;
  let selectedCity = null;
  let selectedCityEventIdx = 0;
  let isPlaying = false;
  let playInterval = null;
  let activeYearFilter = 'all';
  let filteredEvents = [...WW2_EVENTS];
  const imageCache = {};

  // ─── Leaflet Map Setup ─────────────
  const map = L.map('map', {
    center: [48.5, 18],
    zoom: 4,
    minZoom: 3,
    maxZoom: 10,
    zoomControl: true,
    attributionControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    pane: 'shadowPane',
    opacity: 0.35,
  }).addTo(map);

  // ─── Territory Layer Group ─────────
  let territoryLayers = L.layerGroup().addTo(map);

  function renderTerritories(phase) {
    territoryLayers.clearLayers();
    const data = TERRITORY_PHASES[phase];
    if (!data) return;

    ['soviet', 'allied', 'axis'].forEach(faction => {
      (data[faction] || []).forEach(territory => {
        const polygon = L.polygon(territory.coords, {
          color: territory.borderColor,
          weight: 1.5,
          fillColor: territory.color,
          fillOpacity: 1,
          opacity: 0.8,
          smoothFactor: 1.5,
        });

        polygon.bindTooltip(territory.label, {
          permanent: false,
          direction: 'center',
          className: 'city-label',
        });

        territoryLayers.addLayer(polygon);
      });
    });
  }

  // ─── City Markers ──────────────────
  let cityMarkerLayers = L.layerGroup().addTo(map);
  let cityMarkerRefs = {};

  function createCityMarkers() {
    CITY_MARKERS.forEach(city => {
      const icon = L.divIcon({
        className: 'city-marker-icon',
        html: '<div class="city-marker-dot" id="dot-' + city.id + '"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
      });

      const marker = L.marker([city.lat, city.lng], { icon })
        .on('click', () => openCityPanel(city));

      marker.bindTooltip(city.name, {
        permanent: true,
        direction: 'right',
        offset: [10, 0],
        className: 'city-label',
      });

      cityMarkerRefs[city.id] = marker;
      cityMarkerLayers.addLayer(marker);
    });
  }

  // ─── Wikipedia Image Fetching ──────
  async function fetchWikiImage(articleTitle) {
    if (!articleTitle) return null;
    if (imageCache[articleTitle] !== undefined) return imageCache[articleTitle];

    try {
      const resp = await fetch(
        'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(articleTitle)
      );
      if (!resp.ok) { imageCache[articleTitle] = null; return null; }
      const data = await resp.json();
      const url = data.thumbnail?.source || null;
      imageCache[articleTitle] = url;
      return url;
    } catch {
      imageCache[articleTitle] = null;
      return null;
    }
  }

  function loadImageIntoContainer(articleTitle) {
    const img = document.getElementById('city-event-img');
    const placeholder = document.getElementById('city-img-placeholder');
    const spinner = document.getElementById('city-img-spinner');
    const icon = document.getElementById('city-img-icon');

    // Reset
    img.classList.remove('loaded');
    img.src = '';
    placeholder.classList.remove('hidden');
    spinner.style.display = 'block';
    icon.style.display = 'none';

    fetchWikiImage(articleTitle).then(url => {
      if (url) {
        img.onload = () => {
          img.classList.add('loaded');
          placeholder.classList.add('hidden');
        };
        img.onerror = () => {
          spinner.style.display = 'none';
          icon.style.display = 'block';
        };
        img.src = url;
        img.alt = articleTitle ? articleTitle.replace(/_/g, ' ') : '';
      } else {
        spinner.style.display = 'none';
        icon.style.display = 'block';
      }
    });
  }

  // ─── City Info Panel Logic ─────────
  const cityPanel = document.getElementById('city-panel');
  const cityPanelName = document.getElementById('city-panel-name');
  const cityEventTabs = document.getElementById('city-event-tabs');
  const cityEventTitle = document.getElementById('city-event-title');
  const cityEventDate = document.getElementById('city-event-date');
  const cityEventText = document.getElementById('city-event-text');
  const cityEventSource = document.getElementById('city-event-source');
  const cityEventStats = document.getElementById('city-event-stats');
  const notablePeopleSection = document.getElementById('city-notable-people');
  const notablePeopleList = document.getElementById('notable-people-list');

  function openCityPanel(city) {
    if (selectedCity) {
      const prevDot = document.getElementById('dot-' + selectedCity.id);
      if (prevDot) prevDot.classList.remove('active');
    }

    if (selectedCity && selectedCity.id === city.id) {
      closeCityPanel();
      return;
    }

    selectedCity = city;
    selectedCityEventIdx = 0;

    const dot = document.getElementById('dot-' + city.id);
    if (dot) dot.classList.add('active');

    cityPanelName.textContent = city.name;

    // Notable people
    if (city.notablePeople && city.notablePeople.length > 0) {
      notablePeopleSection.style.display = 'block';
      notablePeopleList.innerHTML = city.notablePeople
        .map(p => '<span class="person-tag">' + p + '</span>')
        .join('');
    } else {
      notablePeopleSection.style.display = 'none';
    }

    // Tabs
    cityEventTabs.innerHTML = '';
    if (city.events.length > 1) {
      cityEventTabs.classList.add('visible');
      city.events.forEach((evt, idx) => {
        const tab = document.createElement('button');
        tab.className = 'city-tab' + (idx === 0 ? ' active' : '');
        tab.textContent = evt.date;
        tab.addEventListener('click', () => {
          selectedCityEventIdx = idx;
          document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderCityEvent();
        });
        cityEventTabs.appendChild(tab);
      });
    } else {
      cityEventTabs.classList.remove('visible');
    }

    renderCityEvent();
    cityPanel.classList.add('open');
  }

  function renderCityEvent() {
    if (!selectedCity) return;
    const evt = selectedCity.events[selectedCityEventIdx];
    cityEventTitle.textContent = evt.title;
    cityEventDate.textContent = evt.date;
    cityEventText.textContent = evt.text;

    // Load image from Wikipedia
    loadImageIntoContainer(evt.wikiArticle);

    // Casualties / stats
    if (evt.casualties) {
      cityEventStats.innerHTML = '<div class="stat-item"><span class="stat-value">' + evt.casualties + '</span>Casualties</div>';
      cityEventStats.style.display = 'flex';
    } else {
      cityEventStats.style.display = 'none';
    }

    cityEventSource.textContent = evt.wikiArticle
      ? '\uD83D\uDCDA Source: Wikipedia \u2013 ' + evt.wikiArticle.replace(/_/g, ' ')
      : '';
  }

  function closeCityPanel() {
    if (selectedCity) {
      const dot = document.getElementById('dot-' + selectedCity.id);
      if (dot) dot.classList.remove('active');
    }
    selectedCity = null;
    cityPanel.classList.remove('open');
  }

  document.getElementById('close-city-btn').addEventListener('click', closeCityPanel);

  // ─── Year Filter ───────────────────
  function setYearFilter(year) {
    activeYearFilter = year;

    // Update button states
    document.querySelectorAll('.year-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.year === String(year));
    });

    // Filter events
    if (year === 'all') {
      filteredEvents = [...WW2_EVENTS];
    } else {
      filteredEvents = WW2_EVENTS.filter(e => e.year === parseInt(year));
    }

    // Reset selection to first filtered event
    selectedEventIndex = 0;
    if (filteredEvents.length > 0) {
      selectEvent(0);
    }
  }

  // Wire up year selector buttons
  document.querySelectorAll('.year-btn').forEach(btn => {
    btn.addEventListener('click', () => setYearFilter(btn.dataset.year));
  });

  // ─── Timeline Rendering ────────────
  const timelineList = document.getElementById('timeline-list');

  function renderTimeline() {
    timelineList.innerHTML = '';

    // Add year header if filtering by year
    if (activeYearFilter !== 'all') {
      const header = document.createElement('div');
      header.style.cssText = 'padding: 8px 24px; font-size: 12px; color: var(--gold-dim); letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-mono);';
      header.textContent = activeYearFilter + ' \u2022 ' + filteredEvents.length + ' events';
      timelineList.appendChild(header);
    }

    filteredEvents.forEach((event, index) => {
      const btn = document.createElement('button');
      const phaseColor = PHASE_LABELS[event.phase]?.color || '#888';

      let classes = 'timeline-event';
      if (index === selectedEventIndex) classes += ' active';
      if (index < selectedEventIndex) classes += ' past';
      btn.className = classes;

      if (index === selectedEventIndex) {
        btn.style.borderLeftColor = phaseColor;
      }

      btn.innerHTML =
        '<div class="event-dot-col">' +
          '<div class="event-dot" style="background: ' + (index === selectedEventIndex ? phaseColor : '') + '; ' + (index === selectedEventIndex ? 'box-shadow: 0 0 12px ' + phaseColor + '60;' : '') + '"></div>' +
          (index < filteredEvents.length - 1 ? '<div class="event-line"></div>' : '') +
        '</div>' +
        '<div class="event-content">' +
          '<div class="event-date" style="color: ' + (index === selectedEventIndex ? phaseColor : '') + '">' + event.date + '</div>' +
          '<div class="event-title">' + event.title + '</div>' +
          '<div class="event-description">' + event.description + '</div>' +
        '</div>';

      btn.addEventListener('click', () => selectEvent(index));
      timelineList.appendChild(btn);
    });
  }

  // ─── Core State Transitions ────────
  function selectEvent(index) {
    selectedEventIndex = index;
    closeCityPanel();

    const event = filteredEvents[index];
    if (!event) return;
    const phase = PHASE_LABELS[event.phase] || PHASE_LABELS.invasion_poland;

    // Update phase indicator
    document.getElementById('phase-dot').style.background = phase.color;
    document.getElementById('phase-dot').style.boxShadow = '0 0 10px ' + phase.color + '80';
    document.getElementById('phase-label').textContent = phase.label;
    document.getElementById('phase-label').style.color = phase.color;
    document.getElementById('phase-date').textContent = event.date;

    // Update progress bar
    const pct = ((index + 1) / filteredEvents.length) * 100;
    const fill = document.getElementById('progress-bar-fill');
    fill.style.width = pct + '%';
    fill.style.background = 'linear-gradient(90deg, ' + phase.color + ', ' + phase.color + '80)';

    document.getElementById('phase-indicator').style.borderColor = phase.color + '40';

    // Render territories
    renderTerritories(event.phase);

    // Re-render timeline
    renderTimeline();

    // Scroll active event into view
    const activeBtn = timelineList.querySelector('.timeline-event.active');
    if (activeBtn) {
      activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  // ─── Play/Pause ────────────────────
  const playBtn = document.getElementById('play-btn');

  function togglePlay() {
    if (isPlaying) {
      clearInterval(playInterval);
      isPlaying = false;
      playBtn.textContent = '\u25B6 Play Through War';
      playBtn.classList.remove('playing');
      return;
    }

    isPlaying = true;
    playBtn.textContent = '\u23F8 Pause Timeline';
    playBtn.classList.add('playing');

    let idx = selectedEventIndex;
    playInterval = setInterval(() => {
      idx++;
      if (idx >= filteredEvents.length) {
        clearInterval(playInterval);
        isPlaying = false;
        playBtn.textContent = '\u25B6 Play Through War';
        playBtn.classList.remove('playing');
        return;
      }
      selectEvent(idx);
    }, 2500);
  }

  playBtn.addEventListener('click', togglePlay);

  // ─── Keyboard Navigation ───────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      if (selectedEventIndex < filteredEvents.length - 1) selectEvent(selectedEventIndex + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (selectedEventIndex > 0) selectEvent(selectedEventIndex - 1);
    } else if (e.key === ' ') {
      e.preventDefault();
      togglePlay();
    } else if (e.key === 'Escape') {
      closeCityPanel();
    }
  });

  // ─── Initialize ────────────────────
  createCityMarkers();
  selectEvent(0);

})();
</script>
