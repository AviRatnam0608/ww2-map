<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WW2 Interactive Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="styles/base.css" />
<link rel="stylesheet" href="styles/timeline.css" />
<link rel="stylesheet" href="styles/map.css" />
<link rel="stylesheet" href="styles/cityPanel.css" />
<link rel="stylesheet" href="styles/animations.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     components/TimelinePanel
     ═══════════════════════════════════════ -->
<div id="timeline-panel">
  <div class="panel-header">
    <div class="subtitle">Interactive Atlas</div>
    <h1>World War II</h1>
    <div class="tagline">The Shifting Borders of Europe, 1939&ndash;1945</div>
  </div>

  <div class="year-selector" id="year-selector">
    <button class="year-btn all-btn active" data-year="all">All</button>
    <button class="year-btn" data-year="1939">1939</button>
    <button class="year-btn" data-year="1940">1940</button>
    <button class="year-btn" data-year="1941">1941</button>
    <button class="year-btn" data-year="1942">1942</button>
    <button class="year-btn" data-year="1943">1943</button>
    <button class="year-btn" data-year="1944">1944</button>
    <button class="year-btn" data-year="1945">1945</button>
  </div>

  <div class="play-section">
    <button id="play-btn">&#9654; Play Through War</button>
  </div>

  <div id="timeline-list"></div>

  <div id="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: rgba(180, 40, 40, 0.6)"></div>
      <div class="legend-label">Axis Powers</div>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: rgba(40, 80, 160, 0.5)"></div>
      <div class="legend-label">Western Allies</div>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: rgba(140, 30, 30, 0.5)"></div>
      <div class="legend-label">Soviet Union</div>
    </div>
    <div class="legend-item">
      <div class="legend-swatch circle" style="background: #c0a030; border: 2px solid #c0a030;"></div>
      <div class="legend-label">Battle / Event Marker</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     components/MapView
     ═══════════════════════════════════════ -->
<div id="map-container">
  <div id="phase-indicator">
    <div id="phase-dot"></div>
    <span id="phase-label"></span>
    <span id="phase-date"></span>
  </div>

  <div id="map"></div>

  <div id="progress-bar-bg">
    <div id="progress-bar-fill"></div>
  </div>

  <!-- ═══════════════════════════════════════
       components/CityInfoPanel
       ═══════════════════════════════════════ -->
  <div id="city-panel">
    <div class="city-panel-header">
      <div>
        <div class="label">Historical Events</div>
        <div class="city-name" id="city-panel-name"></div>
      </div>
      <button id="close-city-btn">&#10005;</button>
    </div>
    <div id="city-event-tabs"></div>
    <div id="city-event-content">
      <div class="event-image-container" id="city-image-container">
        <img id="city-event-img" alt="" />
        <div class="img-placeholder" id="city-img-placeholder">
          <div class="loading-spinner" id="city-img-spinner" style="display:none"></div>
          <div class="icon" id="city-img-icon">&#127963;&#65039;</div>
          <div class="img-label">HISTORICAL PHOTOGRAPH</div>
        </div>
      </div>
      <h3 id="city-event-title"></h3>
      <div id="city-event-date"></div>
      <p id="city-event-text"></p>
      <div class="event-stats" id="city-event-stats"></div>
      <div class="notable-people" id="city-notable-people" style="display:none">
        <h4>Notable Figures</h4>
        <div id="notable-people-list"></div>
      </div>
      <div class="event-source" id="city-event-source"></div>
    </div>
  </div>

  <div id="map-hint">Scroll to zoom &middot; Drag to pan &middot; Click markers to explore</div>
</div>

<!-- Data (must load before app.js) -->
<script src="data/events.js"></script>
<script src="data/cityMarkers.js"></script>
<script src="data/territories.js"></script>

<!-- App Logic -->
<script src="js/app.js"></script>
</body>
</html>
